name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Core test matrix ────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install core + dev deps
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          # Auto-fix all fixable issues (import ordering, etc.) then assert clean
          ruff check --fix afmx/ || true
          ruff check afmx/

      - name: Type check (mypy)
        run: mypy afmx/ --ignore-missing-imports
        continue-on-error: true

      - name: Run core tests
        run: pytest tests/ --cov=afmx --cov-report=xml -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ── MCP adapter optional tests ───────────────────────────────────────────────
  # Run separately so a missing mcp package doesn't fail the core matrix.
  test-mcp:
    name: Test MCP adapter (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install core + dev + mcp
        run: pip install -e ".[dev,mcp]"

      - name: Run MCP adapter tests
        run: |
          pytest tests/unit/test_week1_week2_fixes.py \
            -k "MCP or mcp or Mcp" \
            -v

      - name: Run MCP example (smoke test)
        run: python examples/10_mcp_adapter.py

  # ── Build verification (pre-publish check) ───────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution metadata
        run: twine check dist/*

      - name: Verify wheel installs cleanly
        run: |
          pip install dist/*.whl
          python -c "import afmx; print('afmx', afmx.__version__)"
          python -c "from afmx.adapters.mcp import MCPAdapter; print('MCPAdapter OK')"
