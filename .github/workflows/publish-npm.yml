name: Publish @agentdyne9/afmx to npm

on:
  release:
    types: [published]

jobs:
  publish-npm:
    name: Build & publish TypeScript SDK
    runs-on: ubuntu-latest

    # Only publish when the release tag is v* (not pre-release drafts)
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json

      - name: Install dependencies
        working-directory: sdk/typescript
        run: npm ci || npm install

      - name: Type-check
        working-directory: sdk/typescript
        run: npx tsc --noEmit

      - name: Build
        working-directory: sdk/typescript
        run: npm run build

      - name: Verify build output
        working-directory: sdk/typescript
        run: |
          test -f dist/index.js   || (echo "dist/index.js missing" && exit 1)
          test -f dist/index.d.ts || (echo "dist/index.d.ts missing" && exit 1)
          node -e "const m = require('./dist/index.js'); console.log('Exports:', Object.keys(m).join(', '))"

      - name: Publish to npm
        working-directory: sdk/typescript
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
