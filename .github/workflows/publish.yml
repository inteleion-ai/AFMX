name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify distribution metadata
        run: twine check dist/*

      - name: Smoke-test wheel install
        run: |
          pip install dist/*.whl
          python -c "import afmx; assert afmx.__version__ == '1.3.0', f'Expected 1.3.0 got {afmx.__version__}'; print('Version:', afmx.__version__)"
          python -c "from afmx.adapters.mcp import MCPAdapter; print('MCPAdapter OK')"
          python -c "from afmx.adapters.semantic_kernel import SemanticKernelAdapter; print('SemanticKernelAdapter OK')"
          python -c "from afmx.adapters.google_adk import GoogleADKAdapter; print('GoogleADKAdapter OK')"
          python -c "from afmx.adapters.bedrock import BedrockAdapter; print('BedrockAdapter OK')"
          python -c "from afmx.models.execution import ExecutionRecord; print('ExecutionRecord OK')"
          python -c "from afmx.observability.events import EventType; assert hasattr(EventType, 'LAYER_STARTED'); print('LAYER_STARTED OK')"
          python -c "from afmx.integrations.rhfl import attach_rhfl; print('RHFL integration OK')"

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
